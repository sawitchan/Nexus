<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS ULTIMATE V7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: #a855f7; --bg: #000000; --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .premium-glass { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); transition: all 0.2s ease; }
        .premium-glass:active { transform: scale(0.98); }
        .active-nav { color: var(--primary) !important; filter: drop-shadow(0 0 8px var(--primary)); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .cat-active { background: var(--primary) !important; color: white !important; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .nexus-gradient { background: linear-gradient(135deg, #a855f7 0%, #d946ef 100%); }
        .result-box { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(168, 85, 247, 0.3); }
    </style>
</head>
<body>

    <header class="p-6 sticky top-0 z-[100] bg-black/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 nexus-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                <i data-lucide="zap" class="text-white fill-current"></i>
            </div>
            <div>
                <h1 class="text-xl font-[800] italic tracking-tighter leading-none">NEXUS<span class="text-purple-500">V7</span></h1>
                <p id="system-status" class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-1">Status: Connecting...</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p id="clock" class="text-xs font-black">00:00</p>
                <p class="text-[7px] text-green-500 font-bold uppercase">Cloud Sync</p>
            </div>
        </div>
    </header>

    <div id="category-bar" class="flex gap-2 overflow-x-auto px-6 py-5 hide-scroll">
        <button onclick="filterTools('All')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap cat-active">All</button>
        <button onclick="filterTools('Media')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap">Medsos</button>
        <button onclick="filterTools('AI')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap">AI Brain</button>
    </div>

    <main class="px-6" id="main-content">
        <div id="user-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 h-20 premium-glass rounded-[2.5rem] flex justify-around items-center z-[200] border-white/10">
        <button onclick="switchTab('home')" id="nav-home" class="p-3 active-nav"><i data-lucide="layout-grid"></i></button>
        <button onclick="switchTab('ai')" id="nav-ai" class="p-3 text-gray-600"><i data-lucide="bot"></i></button>
        <button onclick="switchTab('settings')" id="nav-settings" class="p-3 text-gray-600"><i data-lucide="settings"></i></button>
    </nav>

    <div id="modal" class="fixed inset-0 z-[300] hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 premium-glass rounded-t-[3rem] p-8 max-h-[90vh] overflow-y-auto border-t border-purple-500/20">
            <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://iddixsqqpjbyswsadjwv.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkZGl4c3FxcGpieXN3c2Fkand2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTUwNTYsImV4cCI6MjA4ODczMTA1Nn0.rXWDEi26WWE1VJQ2dwjpBXhK4YqRCgVC-HfxLkcdDbA';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const USER_TOOLS = [
        { id: 'tt', cat: 'Media', title: 'TikTok DL', icon: 'video', color: '#ff0050', desc: 'Download HD Video' },
        { id: 'ig', cat: 'Media', title: 'Instagram', icon: 'instagram', color: '#e1306c', desc: 'Save Reels & Stories' },
        { id: 'yt', cat: 'Media', title: 'YouTube', icon: 'youtube', color: '#ff0000', desc: 'Audio & Video 4K' },
        { id: 'qr', cat: 'Files', title: 'QR Maker', icon: 'qr-code', color: '#14b8a6', desc: 'Custom QR Gen' },
        { id: 'pass', cat: 'Files', title: 'Password', icon: 'key', color: '#fb7185', desc: 'Secure Generator' }
    ];

    let currentUser = null;

    async function initSupabase() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                const { data } = await supabase.auth.signInAnonymously();
                currentUser = data.user;
            } else {
                currentUser = session.user;
            }
            document.getElementById('system-status').innerText = 'Status: Synced';
            document.getElementById('system-status').style.color = '#22c55e';
        } catch(e) {
            document.getElementById('system-status').innerText = 'Status: Local Mode';
        }
    }

    async function saveHistory(toolName, detail) {
        if (!currentUser) return;
        await supabase.from('nexus_history').insert([
            { 
                user_id: currentUser.id, 
                tool_name: toolName, 
                action_type: 'Execution', 
                detail: detail 
            }
        ]);
    }

    function renderTools() {
        const grid = document.getElementById('user-grid');
        grid.innerHTML = USER_TOOLS.map(t => `
            <div class="premium-glass p-6 rounded-[2.5rem] flex flex-col items-center text-center cursor-pointer" onclick="openTool('${t.id}')">
                <div class="w-16 h-16 rounded-3xl flex items-center justify-center mb-4" style="background: ${t.color}15; color: ${t.color}">
                    <i data-lucide="${t.icon}"></i>
                </div>
                <h3 class="text-[11px] font-black uppercase italic">${t.title}</h3>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function openTool(id) {
        const tool = USER_TOOLS.find(x => x.id === id);
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal-content').innerHTML = `
            <div class="flex items-center gap-5 mb-8">
                <div class="w-16 h-16 rounded-2xl flex items-center justify-center" style="background: ${tool.color}20; color: ${tool.color}"><i data-lucide="${tool.icon}"></i></div>
                <h2 class="text-2xl font-black italic uppercase">${tool.title}</h2>
            </div>
            <input type="text" id="tool-input" placeholder="Paste link..." class="w-full premium-glass p-4 rounded-2xl bg-transparent outline-none text-xs text-white mb-4">
            <div id="tool-result" class="hidden result-box p-4 rounded-2xl text-center mb-4"></div>
            <button id="btn-exec" onclick="processTool('${id}', '${tool.title}')" class="w-full nexus-gradient py-4 rounded-xl font-black uppercase">Execute</button>
        `;
        lucide.createIcons();
    }

    async function processTool(id, title) {
        const val = document.getElementById('tool-input').value;
        const resDiv = document.getElementById('tool-result');
        if(!val) return alert("Link mana, Master?");

        resDiv.classList.remove('hidden');
        resDiv.innerHTML = '<p class="animate-pulse text-purple-400">Processing Cloud...</p>';

        try {
            if(id === 'tt') {
                const { data, error } = await supabase.functions.invoke('quick-action', { body: { url: val } });
                if(error) throw error;
                const video = data?.play || data?.data?.play;
                resDiv.innerHTML = `
                    <video src="${video}" controls class="w-full rounded-lg mb-2"></video>
                    <a href="${video}" target="_blank" class="block bg-green-500 p-2 rounded-lg text-black font-bold text-[10px]">DOWNLOAD HD</a>
                `;
                saveHistory(title, val.substring(0, 30));
            } else {
                resDiv.innerHTML = 'Module sedang dikembangkan, Tuan.';
            }
        } catch(e) {
            resDiv.innerHTML = `<p class="text-red-500 text-[10px]">Error: ${e.message}</p>`;
        }
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    window.onload = () => {
        renderTools();
        initSupabase();
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0');
        }, 1000);
    };
    </script>
</body>
</html>
