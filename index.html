<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: #a855f7; --bg: #000000; --card-bg: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .premium-glass { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); transition: all 0.2s ease; }
        .premium-glass:active { transform: scale(0.98); }
        .active-nav { color: var(--primary) !important; filter: drop-shadow(0 0 8px var(--primary)); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .cat-active { background: var(--primary) !important; color: white !important; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .nexus-gradient { background: linear-gradient(135deg, #a855f7 0%, #d946ef 100%); }
        .history-card { border-left: 4px solid var(--primary); }
        #chat-container { display: flex; flex-direction: column; height: calc(100vh - 280px); }
        .modal-scroll::-webkit-scrollbar { width: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }
        input, select, textarea { transition: border-color 0.2s; }
        .result-box { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(168, 85, 247, 0.3); }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="p-6 sticky top-0 z-[100] bg-black/80 backdrop-blur-xl border-b border-white/5 flex justify-between items-center">

                <p id="system-status" class="text-[8px] font-black text-gray-500 uppercase tracking-widest mt-1">Status: Connecting...</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p id="clock" class="text-xs font-black">00:00</p>
                <p class="text-[7px] text-green-500 font-bold uppercase">Cloud Sync</p>
            </div>
        </div>
    </header>

    <!-- CATEGORY -->
    <div id="category-bar" class="flex gap-2 overflow-x-auto px-6 py-5 hide-scroll">
        <button onclick="filterTools('All')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap cat-active">All</button>
        <button onclick="filterTools('Media')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap">Medsos</button>
        <button onclick="filterTools('AI')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap">AI Brain</button>
        <button onclick="filterTools('Files')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap">Files</button>
        <button onclick="filterTools('Dev')" class="cat-btn px-6 py-2.5 rounded-full premium-glass text-[10px] font-black uppercase whitespace-nowrap">Dev Only</button>

    <!-- MAIN -->
    <main class="px-6" id="main-content">
        <div id="user-grid" class="grid grid-cols-2 gap-4"></div>
        <div id="dev-grid" class="hidden grid grid-cols-2 gap-3"></div>
        
        <div id="history-view" class="hidden">
            <div class="flex justify-between items-end mb-6">

                    <option value="1">Februari</option>
                    <option value="2">Maret</option>

            </div>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <div id="ai-view" class="hidden">
            <div id="chat-container" class="premium-glass rounded-[2.5rem] p-6 flex flex-col">

                <div class="mt-4 flex gap-2">
                    <input id="chat-input" type="text" placeholder="Tanya Nexus..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-xs" onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()" class="w-12 h-12 nexus-gradient rounded-2xl flex items-center justify-center"><i data-lucide="send" size="18"></i></button>
                </div>
            </div>
        </div>
        
        <div id="settings-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic uppercase">Settings Hub</h2>
                <span class="text-[10px] text-purple-400 font-bold">20 Tools Active</span>
            </div>
            <div id="settings-grid" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

        <button onclick="switchTab('home')" id="nav-home" class="p-3 active-nav"><i data-lucide="layout-grid"></i></button>
        <button onclick="switchTab('history')" id="nav-history" class="p-3 text-gray-600"><i data-lucide="calendar-days"></i></button>
        <div onclick="openDevAuth()" class="w-16 h-16 nexus-gradient rounded-full flex items-center justify-center -mt-10 border-4 border-black shadow-xl shadow-purple-600/30">
            <i data-lucide="shield-check" class="text-white"></i>
        </div>
        <button onclick="switchTab('ai')" id="nav-ai" class="p-3 text-gray-600"><i data-lucide="bot"></i></button>
        <button onclick="switchTab('settings')" id="nav-settings" class="p-3 text-gray-600"><i data-lucide="settings"></i></button>
    </nav>

        <div class="absolute bottom-0 left-0 right-0 premium-glass rounded-t-[3rem] p-8 max-h-[90vh] overflow-y-auto border-t border-purple-500/20 modal-scroll">
            <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>

    </div>

        // ================== INIT SUPABASE ==================
        async function initSupabase() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                state.user = session.user;
                document.getElementById('system-status').innerText = 'Status: Cloud Ready';
                document.getElementById('system-status').style.color = '#22c55e';
                fetchHistory();
            } else {
                const { data, error } = await supabase.auth.signInAnonymously();
                if (!error) {

                    document.getElementById('system-status').innerText = 'Status: Synced';
                    document.getElementById('system-status').style.color = '#22c55e';
                } else {
                    document.getElementById('system-status').innerText = 'Status: Error';
                }
            }

        // ================== DB FUNCTIONS ==================
        async function saveLog(name, type, detail) {
            if (!state.user) return;
            const tempLog = { id: 'temp-' + Date.now(), tool_name: name, action_type: type, detail: detail, created_at: new Date().toISOString() };
            state.history.unshift(tempLog);
            renderHistory();
            await supabase.from('nexus_history').insert({ user_id: state.user.id, tool_name: name, action_type: type, detail: detail });
            fetchHistory();
        }

        async function fetchHistory() {
            if (!state.user) return;
            const { data } = await supabase.from('nexus_history').select('*').eq('user_id', state.user.id).order('created_at', { ascending: false }).limit(50);
            if (data) { state.history = data; renderHistory(); }
        }

        // ================== RENDER UI ==================
        function renderTools(mode = 'user') {
            const grid = mode === 'user' ? document.getElementById('user-grid') : document.getElementById('dev-grid');
            const data = mode === 'user' ? USER_TOOLS : DEV_TOOLS;
            grid.innerHTML = data.map(t => `
                <div class="premium-glass p-6 rounded-[2.5rem] flex flex-col items-center text-center cursor-pointer" onclick="openTool('${t.id}', '${mode}')">
                    <div class="w-16 h-16 rounded-3xl flex items-center justify-center mb-4" style="background: ${t.color}15; color: ${t.color}"><i data-lucide="${t.icon}" size="28"></i></div>
                    <h3 class="text-[11px] font-black uppercase italic">${t.title}</h3>
                    <p class="text-[8px] text-gray-500 mt-2 font-bold uppercase">${t.desc}</p>

            `).join('');

                 <div class="premium-glass p-5 rounded-[2rem] flex flex-col items-center text-center cursor-pointer" onclick="openTool('${t.id}', 'user')">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-3" style="background: ${t.color}15; color: ${t.color}"><i data-lucide="${t.icon}" size="24"></i></div>
                    <h3 class="text-[10px] font-black uppercase italic">${t.title}</h3>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const filter = document.getElementById('filter-month').value;
            let filtered = filter === 'all' ? state.history : state.history.filter(h => new Date(h.created_at).getMonth() == filter);
            list.innerHTML = filtered.length ? filtered.map(h => `
                <div class="premium-glass p-5 rounded-2xl history-card flex justify-between items-center">
                    <div>
                        <h4 class="text-[11px] font-black uppercase italic">${h.tool_name}</h4>

        // ================== HELPER FUNCTIONS ==================
    async function processMedia(title) {
    const url = document.getElementById('media-url').value;
    if(!url) return alert("Masukkan URL");

    const resDiv = document.getElementById('media-result');
    resDiv.innerHTML = `<p class="text-purple-400 animate-pulse">Menghubungi Server...</p>`;
    resDiv.classList.remove('hidden');

    try {
        const { data, error } = await supabase.functions.invoke('tiktok-dl', {
            body: { url: url }
        });

        if (error) throw error;

        const videoUrl = data.data?.play || data.play || null;
        const musicUrl = data.data?.music || data.music || null;

        if(videoUrl) {
            resDiv.innerHTML = `
                <p class="text-green-400 font-bold mb-4">Berhasil!</p>
                <video controls class="w-full rounded-xl mb-4" src="${videoUrl}"></video>
                <div class="grid grid-cols-2 gap-2">
                    <a href="${videoUrl}" target="_blank" class="bg-green-500 text-black text-center py-2 rounded-xl text-xs font-bold">Download Video</a>
                    <a href="${musicUrl}" target="_blank" class="bg-purple-500 text-white text-center py-2 rounded-xl text-xs font-bold">Download MP3</a>
                  </div>
               `;
               saveLog(title, 'Success', url.substring(0,20));
             } else {
                resDiv.innerHTML = `<p class="text-red-400">Format data tidak dikenali. Cek Console.</p>`;
                console.log(data);
          }

            } catch (err) {
               resDiv.innerHTML = `<p class="text-red-400">Error: ${err.message}</p>`;
          }
     }
        // ================== SYSTEM CONTROL ==================
        function switchTab(tab) {
            ['user-grid', 'dev-grid', 'history-view', 'ai-view', 'settings-view'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('category-bar').classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('nav-' + (tab === 'home' ? 'home' : tab))?.classList.add('active-nav');
            
            if (tab === 'home') document.getElementById(state.isDev ? 'dev-grid' : 'user-grid').classList.remove('hidden');
            else if (tab === 'settings') { document.getElementById('settings-view').classList.remove('hidden'); document.getElementById('category-bar').classList.add('hidden'); renderSettingsHub(); }
            else { document.getElementById(tab + '-view').classList.remove('hidden'); document.getElementById('category-bar').classList.add('hidden'); }
            
            if (tab === 'history') renderHistory();
            if (tab === 'ai') renderChat();
        }

        function filterTools(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('cat-active'));
            event.target.classList.add('cat-active');
            if (cat === 'Dev') { openDevAuth(); return; }
            state.isDev = false;
            switchTab('home');
            const grid = document.getElementById('user-grid');
            const filtered = cat === 'All' ? USER_TOOLS : USER_TOOLS.filter(t => t.cat === cat);
            grid.innerHTML = filtered.map(t => `<div class="premium-glass p-6 rounded-[2.5rem] flex flex-col items-center text-center cursor-pointer" onclick="openTool('${t.id}', 'user')"><div class="w-16 h-16 rounded-3xl flex items-center justify-center mb-4" style="background: ${t.color}15; color: ${t.color}"><i data-lucide="${t.icon}" size="28"></i></div><h3 class="text-[11px] font-black uppercase italic">${t.title}</h3></div>`).join('');
            lucide.createIcons();
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            state.chat.push({ role: 'user', text: input.value, time: new Date().toLocaleTimeString() });
            renderChat();
            setTimeout(() => { state.chat.push({ role: 'bot', text: `Response for: ${input.value}`, time: new Date().toLocaleTimeString() }); renderChat(); }, 800);
            input.value = '';
        }

        function renderChat() {
            const box = document.getElementById('chat-messages');
            box.innerHTML = state.chat.map(c => `<div class="${c.role === 'user' ? 'ml-auto bg-purple-600/20' : 'mr-auto bg-white/5'} p-4 rounded-2xl max-w-[85%] border border-white/10"><p class="text-xs">${c.text}</p></div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function openDevAuth() { document.getElementById('dev-auth').classList.remove('hidden'); }
        function closeDevAuth() { document.getElementById('dev-auth').classList.add('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function verifyDev() { if (document.getElementById('dev-pin').value === APIS.pin) { state.isDev = true; closeDevAuth(); switchTab('home'); renderTools('dev'); } else alert('Salah'); }

        window.onload = async () => {
            await initSupabase();
            renderTools('user');
            setInterval(() => { const n = new Date(); document.getElementById('clock').innerText = n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0'); }, 1000);
            lucide.createIcons();
        };
    </script>
</body>
